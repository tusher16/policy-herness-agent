# Optional Traefik Ingress for PolicyPulse.
# Purpose: Homepage auto-discovery + cert-manager defence-in-depth SSL.
# Public routing is handled by your Cloudflare Tunnel — this Ingress is NOT
# required for public access. Apply it to get PolicyPulse in your Homepage dashboard.
#
# Apply once cert-manager has issued the certificate:
#   kubectl apply -f k8s/ingress.yaml
#   kubectl get certificate policypulse-tls -n apps -w
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: policypulse
  namespace: apps
  annotations:
    # cert-manager issues a Let's Encrypt cert via your existing dns01 ClusterIssuer.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    # Homepage auto-discovery annotations — appears in https://home.tusher16.com
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "PolicyPulse"
    gethomepage.dev/group: "Projects"
    gethomepage.dev/description: "AI agent harness — policy change monitoring"
spec:
  ingressClassName: traefik
  rules:
  - host: policy.tusher16.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: policypulse-frontend
            port:
              number: 80
  tls:
  - hosts:
    - policy.tusher16.com
    secretName: policypulse-tls
