server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to the backend service.
    # In k3s the service name "policypulse-backend" resolves via cluster DNS.
    # In local Docker Compose the backend container must be named "policypulse-backend".
    location /api/ {
        proxy_pass         http://policypulse-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Origin            $http_origin;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    # SPA fallback — all other paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
